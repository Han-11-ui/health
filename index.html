<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>健康指标监测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {} } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 修复：先动态加载 Supabase 脚本，确保加载成功 -->
    <script>
        (function loadSupabaseScript() {
            const script = document.createElement('script');
            // 指定具体版本，避免加载失败
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js';
            script.onload = function() {
                console.log("Supabase 脚本加载成功");
                // 脚本加载完成后标记
                window.supabaseScriptLoaded = true;
                // 如果页面已加载完成，立即初始化
                if (window.pageLoaded) {
                    window.initSupabaseAfterLoad();
                }
            };
            script.onerror = function() {
                alert("⚠️ Supabase 脚本加载失败，请检查网络！");
            };
            document.head.appendChild(script);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .glass-panel { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .ios-card { border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-press:active { transform: scale(0.96); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .date-chip { transition: all 0.2s; }
        .date-chip.active { background: #667eea; color: white; border-color: #667eea; }
        .swipe-hint { animation: swipeHint 2s infinite; }
        @keyframes swipeHint { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-10px); } }
        .loading { display: inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,.3); border-radius:50%; border-top-color:#fff; animation: spin 1s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-2xl p-6 fade-in max-h-[85vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2 border-b border-gray-100">
            <h3 class="text-lg font-bold" id="modalTitle">记录数据</h3>
            <button onclick="window.closeModal()" class="p-2 hover:bg-gray-100 rounded-full">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <form id="healthForm" onsubmit="window.saveRecord(event)" class="space-y-4">
            <input type="hidden" id="editId">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">检测日期 *</label>
                <input type="date" id="date" required class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-xs text-gray-500 mb-1">甘油三酯</label><input type="number" step="0.01" id="triglyceride" placeholder="mmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div><label class="block text-xs text-gray-500 mb-1">总胆固醇</label><input type="number" step="0.01" id="cholesterol" placeholder="mmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div><label class="block text-xs text-gray-500 mb-1">高密度脂蛋白</label><input type="number" step="0.01" id="hdl" placeholder="mmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div><label class="block text-xs text-gray-500 mb-1">低密度脂蛋白</label><input type="number" step="0.01" id="ldl" placeholder="mmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div><label class="block text-xs text-gray-500 mb-1">尿酸</label><input type="number" step="0.01" id="uric" placeholder="μmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div><label class="block text-xs text-gray-500 mb-1">同型半胱氨酸</label><input type="number" step="0.01" id="homocysteine" placeholder="μmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
                <div class="col-span-2"><label class="block text-xs text-gray-500 mb-1">血糖</label><input type="number" step="0.01" id="glucose" placeholder="mmol/L" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl"></div>
            </div>
            <div class="flex space-x-3 pt-4">
                <button type="button" onclick="window.closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-semibold btn-press">取消</button>
                <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold shadow-lg btn-press">保存</button>
            </div>
        </form>
    </div>
</div>

<nav class="gradient-bg text-white sticky top-0 z-40 shadow-lg">
    <div class="max-w-lg mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="bg-white/20 p-1.5 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </div>
            <div>
                <span class="font-bold text-lg">健康监测</span>
                <span class="text-xs text-white/80" id="syncStatus">未同步</span>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="window.syncData()" class="btn-press bg-white/20 p-2 rounded-lg">
                <svg id="syncIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            <button onclick="window.openModal()" class="btn-press bg-white text-indigo-600 px-3 py-1.5 rounded-lg text-sm font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>记一笔</span>
            </button>
        </div>
    </div>
</nav>

<div class="max-w-lg mx-auto px-4 py-4 pb-24 safe-bottom">
    <div class="mb-4">
        <div class="flex justify-between items-center mb-2">
            <h2 class="text-sm font-semibold text-gray-500">选择日期查看</h2>
            <button onclick="window.showAllDates()" class="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">查看全部</button>
        </div>
        <div class="flex space-x-2 overflow-x-auto hide-scrollbar pb-2" id="dateChips"></div>
    </div>

    <div id="currentDateDisplay" class="mb-6 fade-in">
        <div class="flex justify-between items-end mb-3">
            <h2 class="text-lg font-bold" id="selectedDateTitle">最新数据</h2>
            <span class="text-xs text-gray-500" id="recordCountBadge">共 0 条记录</span>
        </div>
        <div class="grid grid-cols-2 gap-3" id="dataCards"></div>
    </div>

    <div id="allDatesView" class="hidden mb-6 fade-in">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-lg font-bold">全部历史数据</h2>
            <button onclick="window.closeAllDates()" class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-lg">返回单日期</button>
        </div>
        <div class="ios-card bg-white overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-xs">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="px-3 py-2 text-left sticky left-0 bg-gray-50">日期</th>
                            <th class="px-2 py-2">甘油三酯</th>
                            <th class="px-2 py-2">胆固醇</th>
                            <th class="px-2 py-2">HDL</th>
                            <th class="px-2 py-2">LDL</th>
                            <th class="px-2 py-2">尿酸</th>
                            <th class="px-2 py-2">血糖</th>
                        </tr>
                    </thead>
                    <tbody id="allDatesTableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="ios-card glass-panel p-4 mb-6">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold">趋势分析</h3>
            <select id="chartSelector" onchange="window.updateChart()" class="bg-gray-100 text-xs rounded-lg px-2 py-1 border-none outline-none">
                <option value="triglyceride">甘油三酯</option>
                <option value="cholesterol">总胆固醇</option>
                <option value="hdl">高密度脂蛋白</option>
                <option value="ldl">低密度脂蛋白</option>
                <option value="uric">尿酸</option>
                <option value="homocysteine">同型半胱氨酸</option>
                <option value="glucose">血糖</option>
            </select>
        </div>
        <div class="h-48 w-full"><canvas id="trendChart"></canvas></div>
    </div>

    <div id="detailListSection">
        <h2 class="text-sm font-semibold text-gray-500 mb-3">记录管理</h2>
        <div id="detailList" class="space-y-3"></div>
    </div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 safe-bottom max-w-lg mx-auto flex justify-around items-center z-30">
    <button onclick="window.exportData()" class="btn-press flex flex-col items-center space-y-1 text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span class="text-xs">备份</span>
    </button>
    <button onclick="window.openModal()" class="btn-press -mt-8 bg-indigo-600 text-white p-4 rounded-full shadow-xl">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </button>
    <button onclick="window.importData()" class="btn-press flex flex-col items-center space-y-1 text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        <span class="text-xs">恢复</span>
    </button>
</div>

<script>
// ==================== 核心配置 ====================
const SUPABASE_URL = "https://sowukmplfbvwehfralgi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvd3VrbXBsZmJ2d2VoZnJhbGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDI4MTcsImV4cCI6MjA4OTQxODgxN30.80Cjj716MAu9ZvxJGqHktCSBg2tmtI8cd9Pjyhz-QDI";

// 全局变量（移除所有 deviceId/user_id 相关逻辑）
window.supabase = null;
window.healthData = [];
window.selectedDate = null;
window.chartInstance = null;
window.pageLoaded = false; // 标记页面是否加载完成

// 指标范围配置
window.ranges = {
    triglyceride: { min:0.4, max:1.8, name:"甘油三酯", unit:"mmol/L", color:"bg-blue-500" },
    cholesterol: { min:0, max:5.6, name:"总胆固醇", unit:"mmol/L", color:"bg-purple-500" },
    hdl: { min:0.9, max:Infinity, name:"高密度脂蛋白", unit:"mmol/L", color:"bg-green-500" },
    ldl: { min:0, max:4.11, name:"低密度脂蛋白", unit:"mmol/L", color:"bg-yellow-500" },
    uric: { min:202, max:416, name:"尿酸", unit:"μmol/L", color:"bg-red-500" },
    homocysteine: { min:4, max:15.4, name:"同型半胱氨酸", unit:"μmol/L", color:"bg-pink-500" },
    glucose: { min:3.33, max:6.11, name:"血糖", unit:"mmol/L", color:"bg-indigo-500" }
};

// 初始化（修复：先检测运行环境，再初始化）
document.addEventListener("DOMContentLoaded", function() {
    window.pageLoaded = true;
    
    // 提示本地 file:// 协议的限制
    if (window.location.protocol === 'file:') {
        alert("⚠️ 重要提示：\n本地直接打开 HTML 文件（file:// 协议）无法连接数据库！\n请：\n1. 上传到腾讯云/服务器用 HTTPS 访问\n2. 或用 VSCode Live Server 等本地 HTTP 服务器运行");
    }
    
    // 如果 Supabase 脚本已加载，直接初始化；否则等待加载
    if (window.supabaseScriptLoaded) {
        window.initSupabaseAfterLoad();
    }
});

// 修复后的 Supabase 初始化逻辑
window.initSupabaseAfterLoad = async function() {
    try {
        // 正确初始化 Supabase（全局对象）
        window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            global: { 
                headers: { 
                    apikey: SUPABASE_KEY, 
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    'Cache-Control': 'no-cache'
                },
                // 延长超时时间 + 强制跨域
                fetchOptions: { timeout: 10000, mode: 'cors' }
            }
        });
        
        // 加载全表数据（无过滤）
        document.getElementById("syncStatus").textContent = "同步中...";
        document.getElementById("syncIcon").classList.add("loading");
        await window.loadFromCloud();
        document.getElementById("syncStatus").textContent = "已同步";
        document.getElementById("syncIcon").classList.remove("loading");
        
        // 渲染页面
        window.renderAll();
    } catch (e) {
        console.error("初始化失败：", e);
        document.getElementById("syncStatus").textContent = "离线模式";
        // 离线模式读取本地缓存
        window.healthData = JSON.parse(localStorage.getItem("healthData") || "[]");
        window.renderAll();
    }
};

// 加载全表所有数据（核心：无过滤）
window.loadFromCloud = async function() {
    if (!window.supabase) return;
    
    // 直接查询全表，按日期倒序
    const { data, error } = await window.supabase
        .from("health_records")
        .select("*")
        .order("date", { ascending: false });
    
    // 打印日志，方便排查
    console.log("数据库原始数据：", data);
    console.log("查询错误：", error);
    
    if (error) {
        console.error("加载数据失败：", error);
        alert("加载数据失败：" + error.message);
        return;
    }
    
    // 赋值给全局变量，并存本地缓存
    window.healthData = data || [];
    localStorage.setItem("healthData", JSON.stringify(window.healthData));
};

// 手动同步数据
window.syncData = async function() {
    if (!window.supabase) {
        alert("当前为离线模式，无法同步");
        return;
    }
    
    document.getElementById("syncIcon").classList.add("loading");
    await window.loadFromCloud();
    document.getElementById("syncIcon").classList.remove("loading");
    document.getElementById("syncStatus").textContent = "已同步 " + new Date().toLocaleTimeString();
    window.renderAll();
    alert("同步成功！共加载 " + window.healthData.length + " 条数据");
};

// 保存/编辑数据（移除 user_id 字段）
window.saveRecord = async function(e) {
    e.preventDefault();
    const editId = document.getElementById("editId").value;
    const date = document.getElementById("date").value;
    
    // 构造数据（移除 user_id）
    const record = {
        date,
        triglyceride: parseFloat(document.getElementById("triglyceride").value) || null,
        cholesterol: parseFloat(document.getElementById("cholesterol").value) || null,
        hdl: parseFloat(document.getElementById("hdl").value) || null,
        ldl: parseFloat(document.getElementById("ldl").value) || null,
        uric: parseFloat(document.getElementById("uric").value) || null,
        homocysteine: parseFloat(document.getElementById("homocysteine").value) || null,
        glucose: parseFloat(document.getElementById("glucose").value) || null
    };
    
    try {
        if (editId) {
            // 编辑已有数据
            await window.supabase
                .from("health_records")
                .update(record)
                .eq("id", editId);
        } else {
            // 新增数据（id 由 Supabase 自动生成）
            await window.supabase
                .from("health_records")
                .insert(record);
        }
        
        // 重新加载全表数据
        await window.loadFromCloud();
        window.selectedDate = date;
        window.renderAll();
        window.closeModal();
        alert("保存成功！");
    } catch (err) {
        console.error("保存失败：", err);
        alert("保存失败：" + err.message);
    }
};

// 渲染所有页面元素
window.renderAll = function() {
    window.renderDateChips();    // 渲染日期标签
    window.renderCurrentDateData(); // 渲染选中日期的数据卡片
    window.renderDetailList();   // 渲染记录列表
    window.updateChart();        // 更新趋势图表
    // 更新记录总数
    document.getElementById("recordCountBadge").textContent = `共 ${window.healthData.length} 条记录`;
};

// 渲染日期标签（显示所有有数据的日期）
window.renderDateChips = function() {
    // 提取所有唯一日期，倒序排列
    const allDates = [...new Set(window.healthData.map(item => item.date))].sort().reverse();
    const container = document.getElementById("dateChips");
    
    // 无数据时提示
    if (!allDates.length) {
        container.innerHTML = `<span class="text-gray-400 text-sm">暂无记录</span>`;
        return;
    }
    
    // 默认选中最新日期
    if (!window.selectedDate) {
        window.selectedDate = allDates[0];
    }
    
    // 生成日期标签
    container.innerHTML = allDates.map(date => `
        <button 
            onclick="window.selectDate('${date}')" 
            class="date-chip flex-shrink-0 px-4 py-2 rounded-full border ${window.selectedDate === date ? 'active' : 'border-gray-200 bg-white text-gray-700'}"
        >
            ${date.slice(5)}
        </button>
    `).join("");
};

// 选择日期
window.selectDate = function(date) {
    window.selectedDate = date;
    window.renderAll();
    window.closeAllDates(); // 回到单日期视图
};

// 显示全部日期视图
window.showAllDates = function() {
    document.getElementById("currentDateDisplay").classList.add("hidden");
    document.getElementById("detailListSection").classList.add("hidden");
    document.getElementById("allDatesView").classList.remove("hidden");
    window.renderAllDatesTable(); // 渲染全量数据表格
};

// 关闭全部日期视图
window.closeAllDates = function() {
    document.getElementById("allDatesView").classList.add("hidden");
    document.getElementById("currentDateDisplay").classList.remove("hidden");
    document.getElementById("detailListSection").classList.remove("hidden");
};

// 渲染选中日期的数据卡片
window.renderCurrentDateData = function() {
    // 筛选选中日期的所有数据（取第一条）
    const dateData = window.healthData.filter(item => item.date === window.selectedDate);
    const container = document.getElementById("dataCards");
    document.getElementById("selectedDateTitle").textContent = window.selectedDate || "选择日期";
    
    // 无数据时提示
    if (!dateData.length) {
        container.innerHTML = `<div class="col-span-2 text-center py-8 text-gray-400">该日期暂无数据</div>`;
        return;
    }
    
    // 取第一条数据渲染卡片
    const data = dateData[0];
    container.innerHTML = Object.keys(window.ranges).map(key => {
        const value = data[key];
        // 判断是否超出范围
        const isWarning = (value !== null) && (
            value < window.ranges[key].min || 
            (window.ranges[key].max !== Infinity && value > window.ranges[key].max)
        );
        // 生成卡片
        return `<div class="ios-card ${isWarning ? 'bg-red-50 border-l-4 border-red-400' : 'bg-white'} p-4 relative">
            <div class="absolute top-0 right-0 w-16 h-16 ${window.ranges[key].color} opacity-10 rounded-bl-full"></div>
            <div class="text-xs text-gray-500">${window.ranges[key].name}</div>
            <div class="text-2xl font-bold ${isWarning ? 'text-red-600' : ''}">${value ?? '-'}</div>
            <div class="text-xs text-gray-400">${window.ranges[key].unit}</div>
        </div>`;
    }).join("");
};

// 渲染选中日期的记录列表
window.renderDetailList = function() {
    const dateData = window.healthData.filter(item => item.date === window.selectedDate);
    const container = document.getElementById("detailList");
    
    // 无数据时提示
    if (!dateData.length) {
        container.innerHTML = `<p class="text-center text-gray-400 py-4">点击右上角「记一笔」添加数据</p>`;
        return;
    }
    
    // 生成记录列表
    container.innerHTML = dateData.map(item => `
        <div class="ios-card bg-white p-4 border-l-4 border-green-400">
            <div class="flex justify-between items-start">
                <div class="font-bold">${item.date}</div>
                <div class="flex space-x-2">
                    <button onclick="window.openModal('${item.id}')" class="text-indigo-600">编辑</button>
                    <button onclick="window.deleteRecord('${item.id}')" class="text-red-600">删除</button>
                </div>
            </div>
        </div>
    `).join("");
};

// 渲染全量数据表格
window.renderAllDatesTable = function() {
    // 按日期倒序排列
    const sortedData = [...window.healthData].sort((a, b) => new Date(b.date) - new Date(a.date));
    const tableBody = document.getElementById("allDatesTableBody");
    
    // 生成表格行
    tableBody.innerHTML = sortedData.map(item => `
        <tr onclick="window.selectDate('${item.date}')" class="hover:bg-gray-50 cursor-pointer">
            <td class="px-3 py-2 sticky left-0 bg-white font-medium">${item.date}</td>
            <td class="px-2 py-2 text-center">${item.triglyceride ?? '-'}</td>
            <td class="px-2 py-2 text-center">${item.cholesterol ?? '-'}</td>
            <td class="px-2 py-2 text-center">${item.hdl ?? '-'}</td>
            <td class="px-2 py-2 text-center">${item.ldl ?? '-'}</td>
            <td class="px-2 py-2 text-center">${item.uric ?? '-'}</td>
            <td class="px-2 py-2 text-center">${item.glucose ?? '-'}</td>
        </tr>
    `).join("");
};

// 更新趋势图表
window.updateChart = function() {
    const selectedKey = document.getElementById("chartSelector").value;
    // 按日期正序排列数据
    const sortedData = [...window.healthData].sort((a, b) => new Date(a.date) - new Date(b.date));
    
    // 销毁旧图表
    if (window.chartInstance) {
        window.chartInstance.destroy();
    }
    
    // 创建新图表
    const ctx = document.getElementById("trendChart").getContext("2d");
    window.chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: sortedData.map(item => item.date.slice(5)), // 显示月-日
            datasets: [{
                label: window.ranges[selectedKey].name,
                data: sortedData.map(item => item[selectedKey]),
                borderColor: "#667eea",
                backgroundColor: "rgba(102,126,234,0.1)",
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
};

// 打开新增/编辑弹窗
window.openModal = function(recordId = null) {
    const modal = document.getElementById("modal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    
    // 重置表单
    const form = document.getElementById("healthForm");
    form.reset();
    document.getElementById("editId").value = "";
    document.getElementById("modalTitle").textContent = "记录数据";
    // 默认日期为选中日期或今天
    document.getElementById("date").value = window.selectedDate || new Date().toISOString().split("T")[0];
    
    // 编辑模式：填充数据
    if (!recordId) return;
    const record = window.healthData.find(item => item.id === recordId);
    if (!record) return;
    
    document.getElementById("modalTitle").textContent = "编辑记录";
    document.getElementById("editId").value = record.id;
    document.getElementById("date").value = record.date;
    // 填充所有指标字段
    Object.keys(window.ranges).forEach(key => {
        document.getElementById(key).value = record[key] ?? "";
    });
};

// 关闭弹窗
window.closeModal = function() {
    const modal = document.getElementById("modal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
};

// 删除记录
window.deleteRecord = async function(recordId) {
    if (!confirm("确定要删除这条记录吗？删除后无法恢复！")) {
        return;
    }
    
    try {
        // 删除数据库中的记录
        await window.supabase
            .from("health_records")
            .delete()
            .eq("id", recordId);
        
        // 重新加载数据并渲染
        await window.loadFromCloud();
        window.renderAll();
        alert("删除成功！");
    } catch (err) {
        console.error("删除失败：", err);
        alert("删除失败：" + err.message);
    }
};

// 导出数据
window.exportData = function() {
    // 转换为格式化的 JSON
    const jsonData = JSON.stringify(window.healthData, null, 2);
    const blob = new Blob([jsonData], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `健康数据备份_${new Date().toLocaleDateString()}.json`;
    a.click();
    // 释放 URL
    URL.revokeObjectURL(a.href);
};

// 导入数据
window.importData = function() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    
    input.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async function(ev) {
            try {
                const importedData = JSON.parse(ev.target.result);
                if (!Array.isArray(importedData)) {
                    alert("导入失败：文件格式错误，必须是数组格式");
                    return;
                }
                
                if (!confirm(`确定要导入 ${importedData.length} 条数据吗？现有数据不会被覆盖，新数据会追加到数据库中`)) {
                    return;
                }
                
                // 批量插入数据（移除 id，由数据库自动生成）
                const insertData = importedData.map(item => {
                    const { id, user_id, ...rest } = item;
                    return rest;
                });
                
                await window.supabase
                    .from("health_records")
                    .insert(insertData);
                
                // 重新加载数据
                await window.loadFromCloud();
                window.renderAll();
                alert(`导入成功！共导入 ${importedData.length} 条数据`);
            } catch (err) {
                console.error("导入失败：", err);
                alert("导入失败：文件格式错误或数据不兼容");
            }
        };
        
        reader.readAsText(file);
    };
    
    input.click();
};
</script>
</body>
</html>
